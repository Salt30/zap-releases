name: Build & Sign Zap

on:
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Import certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          # Decode certificate
          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12

          # Create and configure keychain
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # Import certificate
          security import certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain

          # Verify the identity is available
          echo "Available signing identities:"
          security find-identity -v -p codesigning build.keychain

          # Clean up
          rm certificate.p12

      - name: Inject API key
        run: |
          sed -i '' "s/YOUR_PERPLEXITY_API_KEY/${{ secrets.PERPLEXITY_API_KEY }}/g" src/main.js

      - name: Build and Sign
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CERTIFICATE_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: npx electron-builder --mac dmg zip --publish never

      - name: Verify code signature
        run: |
          APP=$(find dist -name "*.app" -maxdepth 3 | head -1)
          echo "Verifying: $APP"
          codesign --verify --deep --strict --verbose=2 "$APP"
          echo ""
          echo "Spctl assessment:"
          spctl --assess --type execute --verbose "$APP" || true
          echo ""
          echo "Signing info:"
          codesign -dv --verbose=4 "$APP" 2>&1 | head -20

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG=$(ls dist/*.dmg | head -1)
          echo "Submitting: $DMG"

          # Submit and capture output
          RESULT=$(xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait 2>&1) || true

          echo "$RESULT"

          # Extract submission ID
          SUB_ID=$(echo "$RESULT" | grep "id:" | head -1 | awk '{print $2}')
          echo "Submission ID: $SUB_ID"

          # Check if it was invalid
          if echo "$RESULT" | grep -q "Invalid"; then
            echo ""
            echo "=== NOTARIZATION LOG ==="
            xcrun notarytool log "$SUB_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" || true
            echo "========================"
            exit 1
          fi

          # Staple if successful
          xcrun stapler staple "$DMG"
          echo "Notarization and stapling complete!"

      - name: Upload DMG
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Zap-DMG
          path: dist/*.dmg

      - name: Upload ZIP
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Zap-ZIP
          path: dist/*.zip
