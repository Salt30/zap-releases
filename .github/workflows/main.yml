name: Build & Sign Zap

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v3.23.5) - leave empty to read from package.json'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      upload_url: ${{ steps.release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            VERSION=$(node -p "require('./package.json').version")
            echo "version=v${VERSION}" >> $GITHUB_OUTPUT
          fi

      - name: Create draft release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "Zap ${{ steps.version.outputs.version }}"
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install security build tools
        run: |
          npm install --save-dev bytenode javascript-obfuscator
          npm install --save bytenode

      - name: Import certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          echo "Available signing identities:"
          security find-identity -v -p codesigning build.keychain
          rm certificate.p12

      - name: Inject API keys
        run: |
          sed -i '' "s/YOUR_PERPLEXITY_API_KEY/${{ secrets.PERPLEXITY_API_KEY }}/g" src/main.js
          sed -i '' "s/YOUR_OPENAI_API_KEY/${{ secrets.OPENAI_API_KEY }}/g" src/main.js
          sed -i '' "s/YOUR_STRIPE_SECRET_KEY/${{ secrets.STRIPE_SECRET_KEY }}/g" src/main.js
          sed -i '' "s/YOUR_GH_SUPPORT_TOKEN/${{ secrets.GH_SUPPORT_TOKEN }}/g" src/main.js
          sed -i '' "s/YOUR_ADMIN_KEY_1/${{ secrets.ADMIN_KEY_1 }}/g" src/main.js
          sed -i '' "s/YOUR_ADMIN_KEY_2/${{ secrets.ADMIN_KEY_2 }}/g" src/main.js

      - name: Verify API keys were injected
        run: |
          if grep -q "YOUR_PERPLEXITY_API_KEY" src/main.js; then
            echo "ERROR: Perplexity placeholder still present."
            exit 1
          fi
          if grep -q "YOUR_STRIPE_SECRET_KEY" src/main.js; then
            echo "WARNING: Stripe placeholder still present — STRIPE_SECRET_KEY secret may be missing."
          fi
          if grep -q "YOUR_GH_SUPPORT_TOKEN" src/main.js; then
            echo "WARNING: GitHub support token placeholder still present."
          fi
          if grep -q "YOUR_ADMIN_KEY_1" src/main.js; then
            echo "WARNING: Admin key 1 placeholder still present."
          fi
          echo "API key injection verified."

      - name: Obfuscate source code
        run: node scripts/obfuscate.js

      - name: Compile to V8 bytecode
        run: node scripts/compile-bytecode.js

      - name: Verify bytecode compilation
        run: |
          if [ ! -f "src/main.jsc" ]; then
            echo "ERROR: main.jsc not found — bytecode compilation failed"
            exit 1
          fi
          if [ ! -f "src/preload.jsc" ]; then
            echo "ERROR: preload.jsc not found — bytecode compilation failed"
            exit 1
          fi
          echo "Bytecode files:"
          ls -la src/*.jsc
          echo ""
          echo "Loader files (should be tiny):"
          wc -c src/main.js src/preload.js
          echo ""
          echo "Verifying main.js is now a loader (not source):"
          head -3 src/main.js

      - name: Compile native helpers (universal binary)
        run: |
          mkdir -p helpers/bin
          swiftc -O -target arm64-apple-macosx11.0 -o helpers/bin/zap-clicker-arm64 helpers/zap-clicker.swift
          swiftc -O -target x86_64-apple-macosx11.0 -o helpers/bin/zap-clicker-x64 helpers/zap-clicker.swift
          lipo -create helpers/bin/zap-clicker-arm64 helpers/bin/zap-clicker-x64 -output helpers/bin/zap-clicker
          rm helpers/bin/zap-clicker-arm64 helpers/bin/zap-clicker-x64
          chmod +x helpers/bin/zap-clicker
          echo "Compiled zap-clicker (universal):"
          file helpers/bin/zap-clicker

      - name: Build and Sign
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CERTIFICATE_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: npx electron-builder --mac dmg zip --arm64 --x64 --publish never

      - name: Verify code signature
        run: |
          APP=$(find dist -name "*.app" -maxdepth 3 | head -1)
          echo "Verifying: $APP"
          codesign --verify --deep --strict --verbose=2 "$APP"
          echo ""
          echo "Spctl assessment:"
          spctl --assess --type execute --verbose "$APP" || true
          echo ""
          echo "Signing info:"
          codesign -dv --verbose=4 "$APP" 2>&1 | head -20

      - name: Verify ASAR contains bytecode (not source)
        run: |
          ASAR=$(find dist -name "app.asar" | head -1)
          if [ -n "$ASAR" ]; then
            npx asar list "$ASAR" | head -20
            echo ""
            echo "Checking for .jsc files in ASAR:"
            npx asar list "$ASAR" | grep -c "\.jsc" || echo "0 .jsc files found"
            echo ""
            echo "Checking main.js is a loader (< 200 bytes):"
            npx asar extract-file "$ASAR" src/main.js /tmp/extracted_main.js 2>/dev/null || true
            if [ -f /tmp/extracted_main.js ]; then
              wc -c /tmp/extracted_main.js
              cat /tmp/extracted_main.js
            fi
          fi

      - name: Notarize all DMGs
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for DMG in dist/*.dmg; do
            echo "========================================="
            echo "Submitting: $DMG"
            echo "========================================="
            RESULT=$(xcrun notarytool submit "$DMG" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait 2>&1) || true
            echo "$RESULT"
            SUB_ID=$(echo "$RESULT" | grep "id:" | head -1 | awk '{print $2}')
            echo "Submission ID: $SUB_ID"
            if echo "$RESULT" | grep -q "Invalid"; then
              echo ""
              echo "=== NOTARIZATION LOG ==="
              xcrun notarytool log "$SUB_ID" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_APP_SPECIFIC_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" || true
              echo "========================"
              exit 1
            fi
            xcrun stapler staple "$DMG"
            echo "Notarization and stapling complete for $DMG!"
          done

      - name: List dist output
        if: always()
        run: ls -la dist/

      - name: Upload Mac assets to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          echo "Uploading Mac assets to release $VERSION..."
          for f in dist/*.dmg dist/*.zip; do
            if [ -f "$f" ]; then
              echo "Uploading: $f"
              gh release upload "$VERSION" "$f" --clobber
            fi
          done

  build-win:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install security build tools
        run: |
          npm install --save-dev bytenode javascript-obfuscator
          npm install --save bytenode

      - name: Generate Windows icon
        run: |
          pip install Pillow
          python -c "from PIL import Image; img=Image.open('assets/icon.png'); img.save('assets/icon.ico', format='ICO', sizes=[(256,256),(128,128),(64,64),(48,48),(32,32),(16,16)])"
        shell: pwsh

      - name: Inject API keys
        run: |
          (Get-Content src/main.js) -replace 'YOUR_PERPLEXITY_API_KEY', '${{ secrets.PERPLEXITY_API_KEY }}' | Set-Content src/main.js
          (Get-Content src/main.js) -replace 'YOUR_OPENAI_API_KEY', '${{ secrets.OPENAI_API_KEY }}' | Set-Content src/main.js
          (Get-Content src/main.js) -replace 'YOUR_STRIPE_SECRET_KEY', '${{ secrets.STRIPE_SECRET_KEY }}' | Set-Content src/main.js
          (Get-Content src/main.js) -replace 'YOUR_GH_SUPPORT_TOKEN', '${{ secrets.GH_SUPPORT_TOKEN }}' | Set-Content src/main.js
          (Get-Content src/main.js) -replace 'YOUR_ADMIN_KEY_1', '${{ secrets.ADMIN_KEY_1 }}' | Set-Content src/main.js
          (Get-Content src/main.js) -replace 'YOUR_ADMIN_KEY_2', '${{ secrets.ADMIN_KEY_2 }}' | Set-Content src/main.js
        shell: pwsh

      - name: Verify API keys were injected
        run: |
          $content = Get-Content src/main.js -Raw
          if ($content -match 'YOUR_PERPLEXITY_API_KEY') {
            Write-Error "ERROR: Perplexity placeholder still present"
            exit 1
          }
          if ($content -match 'YOUR_STRIPE_SECRET_KEY') {
            Write-Warning "Stripe placeholder still present — STRIPE_SECRET_KEY secret may be missing."
          }
          if ($content -match 'YOUR_GH_SUPPORT_TOKEN') {
            Write-Warning "GitHub support token placeholder still present."
          }
          if ($content -match 'YOUR_ADMIN_KEY_1') {
            Write-Warning "Admin key 1 placeholder still present."
          }
          Write-Output "API key injection verified."
        shell: pwsh

      - name: Obfuscate source code
        run: node scripts/obfuscate.js

      - name: Compile to V8 bytecode
        run: node scripts/compile-bytecode.js

      - name: Verify bytecode compilation
        run: |
          if (!(Test-Path "src/main.jsc")) { Write-Error "main.jsc not found"; exit 1 }
          if (!(Test-Path "src/preload.jsc")) { Write-Error "preload.jsc not found"; exit 1 }
          Write-Output "Bytecode files created successfully"
          Get-ChildItem src/*.jsc | Format-Table Name, Length
        shell: pwsh

      - name: Build Windows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win nsis zip --publish never

      - name: Upload Windows assets to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $VERSION = "${{ needs.create-release.outputs.version }}"
          Write-Output "Uploading Windows assets to release $VERSION..."
          Get-ChildItem dist/*.exe, dist/*.zip | ForEach-Object {
            Write-Output "Uploading: $($_.Name)"
            gh release upload $VERSION $_.FullName --clobber
          }
        shell: pwsh

  build-linux:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install security build tools
        run: |
          npm install --save-dev bytenode javascript-obfuscator
          npm install --save bytenode

      - name: Install Linux build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg fakeroot rpm

      - name: Generate Linux icons
        run: |
          pip install Pillow
          python3 -c "
          from PIL import Image
          import os
          img = Image.open('assets/icon.png')
          for size in [16, 32, 48, 64, 128, 256, 512]:
              d = f'assets/icons/{size}x{size}'
              os.makedirs(d, exist_ok=True)
              img.resize((size, size), Image.LANCZOS).save(f'{d}/icon.png')
          print('Linux icons generated')
          "

      - name: Inject API keys
        run: |
          sed -i "s/YOUR_PERPLEXITY_API_KEY/${{ secrets.PERPLEXITY_API_KEY }}/g" src/main.js
          sed -i "s/YOUR_OPENAI_API_KEY/${{ secrets.OPENAI_API_KEY }}/g" src/main.js
          sed -i "s/YOUR_STRIPE_SECRET_KEY/${{ secrets.STRIPE_SECRET_KEY }}/g" src/main.js
          sed -i "s/YOUR_GH_SUPPORT_TOKEN/${{ secrets.GH_SUPPORT_TOKEN }}/g" src/main.js
          sed -i "s/YOUR_ADMIN_KEY_1/${{ secrets.ADMIN_KEY_1 }}/g" src/main.js
          sed -i "s/YOUR_ADMIN_KEY_2/${{ secrets.ADMIN_KEY_2 }}/g" src/main.js

      - name: Verify API keys were injected
        run: |
          if grep -q "YOUR_PERPLEXITY_API_KEY" src/main.js; then
            echo "ERROR: Perplexity placeholder still present."
            exit 1
          fi
          if grep -q "YOUR_STRIPE_SECRET_KEY" src/main.js; then
            echo "WARNING: Stripe placeholder still present."
          fi
          if grep -q "YOUR_ADMIN_KEY_1" src/main.js; then
            echo "WARNING: Admin key 1 placeholder still present."
          fi
          echo "API key injection verified."

      - name: Obfuscate source code
        run: node scripts/obfuscate.js

      - name: Compile to V8 bytecode
        run: node scripts/compile-bytecode.js

      - name: Verify bytecode compilation
        run: |
          test -f src/main.jsc || { echo "ERROR: main.jsc not found"; exit 1; }
          test -f src/preload.jsc || { echo "ERROR: preload.jsc not found"; exit 1; }
          echo "Bytecode files:"
          ls -la src/*.jsc

      - name: Build Linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --linux deb AppImage zip --publish never

      - name: List dist output
        if: always()
        run: ls -la dist/

      - name: Upload Linux assets to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          echo "Uploading Linux assets to release $VERSION..."
          for f in dist/*.deb dist/*.AppImage dist/*.zip; do
            if [ -f "$f" ]; then
              echo "Uploading: $f"
              gh release upload "$VERSION" "$f" --clobber
            fi
          done
