<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Activate Zap</title>
<style>
  :root{--accent:#facc15;--accent-dim:rgba(250,204,21,0.15);--bg:#0a0a12;--card:#111118;--border:rgba(255,255,255,0.08);--text:#f5f5f7;--muted:rgba(255,255,255,0.55);--dim:rgba(255,255,255,0.3);--green:#22c55e;--red:#ef4444}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;-webkit-app-region:drag;overflow:hidden}
  button,input,a{-webkit-app-region:no-drag}

  .logo{font-size:48px;margin-bottom:8px;filter:drop-shadow(0 0 20px rgba(250,204,21,0.3))}
  .title{font-size:24px;font-weight:700;letter-spacing:-0.3px;margin-bottom:4px}
  .title span{color:var(--accent)}

  .trial-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;margin:12px 0 24px}
  .trial-badge.active{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2);color:var(--green)}
  .trial-badge.expired{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:var(--red)}

  .section{width:100%;max-width:360px}
  .section-title{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:10px}

  .key-input{width:100%;padding:14px 16px;background:var(--card);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'SF Mono','Fira Code',monospace;font-size:14px;outline:none;transition:all .2s;letter-spacing:0.5px}
  .key-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(250,204,21,0.1)}
  .key-input::placeholder{color:var(--dim);font-family:system-ui,-apple-system,sans-serif;letter-spacing:0}

  .activate-btn{width:100%;padding:13px;border:none;border-radius:12px;background:var(--accent);color:#000;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;margin-top:12px}
  .activate-btn:hover{background:#eab308;transform:scale(1.02)}
  .activate-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}

  .trial-btn{width:100%;padding:13px;border:1px solid var(--border);border-radius:12px;background:transparent;color:var(--muted);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;margin-top:8px}
  .trial-btn:hover{border-color:rgba(255,255,255,0.2);color:var(--text);background:rgba(255,255,255,0.03)}

  .divider{display:flex;align-items:center;gap:12px;margin:20px 0;width:100%;max-width:360px}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
  .divider span{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:1px}

  .buy-link{font-size:13px;color:var(--accent);text-decoration:none;margin-top:16px;transition:opacity .15s}
  .buy-link:hover{opacity:0.8;text-decoration:underline}

  .status{font-size:12px;margin-top:10px;min-height:20px;text-align:center;transition:opacity .2s}
  .status.error{color:var(--red)}
  .status.success{color:var(--green)}

  .skip-text{font-size:11px;color:var(--dim);margin-top:20px;text-align:center}
</style>
</head>
<body>

<div class="logo">&#9889;</div>
<div class="title">Activate <span>Zap</span></div>

<div class="trial-badge active" id="trial-badge">
  <span id="trial-dot" style="font-size:8px">&#9679;</span>
  <span id="trial-text">Loading...</span>
</div>

<div class="section">
  <div class="section-title">License Key</div>
  <input type="text" class="key-input" id="license-key" placeholder="XXXX-XXXX-XXXX-XXXX" autocomplete="off" spellcheck="false" />
  <button class="activate-btn" id="activate-btn">Activate License</button>
  <div class="status" id="status"></div>
</div>

<div class="divider"><span>or</span></div>

<button class="trial-btn" id="trial-btn">Start 7-Day Free Trial</button>

<a class="buy-link" id="buy-link" href="#">Get a license at tryzap.net &rarr;</a>

<div class="skip-text" id="skip-text"></div>

<script>
(function(){
  var keyInput = document.getElementById('license-key');
  var activateBtn = document.getElementById('activate-btn');
  var trialBtn = document.getElementById('trial-btn');
  var statusEl = document.getElementById('status');
  var trialBadge = document.getElementById('trial-badge');
  var trialText = document.getElementById('trial-text');
  var skipText = document.getElementById('skip-text');
  var buyLink = document.getElementById('buy-link');

  // Load current license status
  window.zap.getLicenseStatus().then(function(s) {
    if (s.licenseValid && s.hasKey) {
      trialBadge.className = 'trial-badge active';
      trialText.textContent = 'Licensed — ' + (s.email || 'Active');
      trialBtn.style.display = 'none';
      keyInput.value = '••••••••••••••••';
      keyInput.disabled = true;
      activateBtn.textContent = 'Already Activated';
      activateBtn.disabled = true;
      skipText.textContent = 'You can close this window.';
    } else if (s.trialActive) {
      trialBadge.className = 'trial-badge active';
      trialText.textContent = s.trialDaysLeft + ' day' + (s.trialDaysLeft !== 1 ? 's' : '') + ' left in trial';
      trialBtn.textContent = 'Continue Trial (' + s.trialDaysLeft + ' days left)';
      skipText.textContent = 'Enter a license key anytime to unlock permanently.';
    } else if (s.trialDaysLeft === 0 && !s.hasKey) {
      trialBadge.className = 'trial-badge expired';
      trialText.textContent = 'Trial expired';
      trialBtn.style.display = 'none';
      skipText.textContent = 'Purchase a license to continue using Zap.';
    } else {
      trialBadge.className = 'trial-badge active';
      trialText.textContent = 'Not yet activated';
      skipText.textContent = '';
    }
  });

  // Open purchase URL
  buyLink.addEventListener('click', function(e) {
    e.preventDefault();
    // This will be your LemonSqueezy checkout URL
    require('electron').shell.openExternal('https://tryzap.net');
  });

  // Activate license
  activateBtn.addEventListener('click', async function() {
    var key = keyInput.value.trim();
    if (!key) { statusEl.textContent = 'Please enter a license key.'; statusEl.className = 'status error'; return; }

    activateBtn.disabled = true;
    activateBtn.textContent = 'Validating...';
    statusEl.textContent = '';

    var result = await window.zap.validateLicense(key);

    if (result.valid) {
      statusEl.textContent = 'License activated!' + (result.offline ? ' (verified offline)' : '');
      statusEl.className = 'status success';
      activateBtn.textContent = 'Activated!';
      trialBadge.className = 'trial-badge active';
      trialText.textContent = 'Licensed';
      setTimeout(function() { window.close(); }, 1500);
    } else {
      statusEl.textContent = result.error || 'Invalid license key.';
      statusEl.className = 'status error';
      activateBtn.disabled = false;
      activateBtn.textContent = 'Activate License';
    }
  });

  // Start trial
  trialBtn.addEventListener('click', function() {
    window.zap.startTrial();
  });

  // Enter to submit
  keyInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') activateBtn.click();
  });
})();
</script>
</body>
</html>
