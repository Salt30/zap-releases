<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Activate Zap</title>
<style>
  :root{--accent:#4a6fa5;--accent-glow:#5b82bd;--accent-dim:#3a5a8a;--bg-deep:#0a0a12;--bg-card:rgba(18,18,35,0.85);--bg-input:rgba(10,10,22,0.9);--text:#f5f0e8;--text-muted:#b8b0a0;--text-dim:#6e6a60;--border:rgba(74,111,165,0.15);--border-card:rgba(74,111,165,0.12);--green:#6ec87a;--red:#ef4444;--orange:#f59e0b}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg-deep);background-image:radial-gradient(ellipse at 20% 0%,rgba(30,45,80,.4) 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(20,30,60,.3) 0%,transparent 60%),linear-gradient(180deg,#0a0a14 0%,#0d0d1c 40%,#0a0b16 100%);color:var(--text);font-family:'SF Pro Display',system-ui,-apple-system,BlinkMacSystemFont,sans-serif;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;-webkit-app-region:drag;overflow:hidden}
  button,input,a{-webkit-app-region:no-drag}

  .logo{width:72px;height:72px;background:linear-gradient(135deg,var(--accent),#3a5a8a);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:34px;color:var(--text);box-shadow:0 4px 28px rgba(74,111,165,.35);margin-bottom:16px}
  .title{font-size:26px;font-weight:700;letter-spacing:-.3px;margin-bottom:4px}
  .title span{color:var(--accent-glow)}

  .section{width:100%;max-width:380px}
  .section-title{font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}

  .email-input{width:100%;padding:14px 16px;background:var(--bg-input);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:all .2s}
  .email-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(74,111,165,.12)}
  .email-input::placeholder{color:var(--text-dim)}

  .subscribe-btn{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--accent),#3a5a8a);color:var(--text);font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;margin-top:14px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 2px 16px rgba(74,111,165,.3);letter-spacing:.2px}
  .subscribe-btn:hover{box-shadow:0 4px 24px rgba(74,111,165,.45);transform:translateY(-1px)}
  .subscribe-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}

  .stripe-badge{font-size:12px;color:var(--text-dim);margin-top:12px;text-align:center;display:flex;align-items:center;justify-content:center;gap:5px}

  .divider{display:flex;align-items:center;gap:12px;margin:24px 0;width:100%;max-width:380px}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
  .divider span{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px}

  .admin-section{width:100%;max-width:380px}
  .admin-toggle{font-size:12px;color:var(--text-dim);cursor:pointer;text-decoration:none;transition:color .15s}
  .admin-toggle:hover{color:var(--text-muted)}
  .admin-input-wrap{display:none;margin-top:12px}

  .key-input{width:100%;padding:14px 16px;background:var(--bg-input);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'SF Mono','Fira Code',monospace;font-size:13px;outline:none;transition:all .2s;letter-spacing:0.5px}
  .key-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(74,111,165,.12)}
  .key-input::placeholder{color:var(--text-dim);font-family:system-ui;letter-spacing:0}

  .admin-btn{width:100%;padding:12px;border:1px solid var(--border);border-radius:12px;background:transparent;color:var(--text);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;margin-top:10px}
  .admin-btn:hover{border-color:var(--accent);color:var(--accent-glow)}
  .admin-btn:disabled{opacity:0.4;cursor:not-allowed}

  .status{font-size:13px;margin-top:12px;min-height:20px;text-align:center;transition:opacity .2s}
  .status.error{color:var(--red)}
  .status.success{color:var(--green)}
  .status.warn{color:var(--orange)}
  .status.info{color:var(--text-muted)}

  .skip-text{font-size:12px;color:var(--text-dim);margin-top:24px;text-align:center}

  .legal-check{display:flex;align-items:flex-start;gap:10px;margin-top:16px;padding:12px 14px;background:rgba(74,111,165,0.04);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:border-color .15s}
  .legal-check:hover{border-color:rgba(74,111,165,0.3)}
  .legal-check input[type="checkbox"]{width:18px;height:18px;margin-top:1px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
  .legal-check label{font-size:12px;color:var(--text-muted);line-height:1.6;cursor:pointer}
  .legal-check label a{color:var(--accent-glow);text-decoration:none;transition:color .15s}
  .legal-check label a:hover{color:var(--text);text-decoration:underline}
</style>
</head>
<body>

<div class="logo">&#9889;</div>
<div class="title">Activate <span>Zap</span></div>

<div style="font-size:14px;color:var(--text-dim);margin:14px 0 28px;text-align:center">Subscribe to unlock full access</div>

<div class="section">
  <div class="section-title">Monthly Subscription</div>
  <input type="email" class="email-input" id="email-input" placeholder="Enter your email address" autocomplete="email" spellcheck="false" />
  <div class="legal-check" onclick="document.getElementById('legal-agree').click()">
    <input type="checkbox" id="legal-agree" onclick="event.stopPropagation()" />
    <label for="legal-agree" onclick="event.stopPropagation()">I agree to the <a href="#" id="link-terms">Terms of Use</a>, <a href="#" id="link-privacy">Privacy Policy</a>, and <a href="#" id="link-aup">Acceptable Use Policy</a>. I accept full liability for how I use this software.</label>
  </div>
  <button class="subscribe-btn" id="subscribe-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
    Subscribe with Stripe
  </button>
  <div class="stripe-badge">&#128274; Secure payment via Stripe</div>
  <div class="status" id="status"></div>
</div>

<div class="divider"><span>or</span></div>

<div class="admin-section">
  <a class="admin-toggle" id="admin-toggle" href="#">Have an admin key? Click here</a>
  <div class="admin-input-wrap" id="admin-wrap">
    <input type="text" class="key-input" id="admin-key" placeholder="Enter admin key" autocomplete="off" spellcheck="false" />
    <button class="admin-btn" id="admin-btn">Activate Key</button>
  </div>
</div>

<div class="skip-text" id="skip-text">A subscription is required to use Zap.</div>

<script>
(function(){
  var emailInput = document.getElementById('email-input');
  var subscribeBtn = document.getElementById('subscribe-btn');
  var statusEl = document.getElementById('status');
  var adminToggle = document.getElementById('admin-toggle');
  var adminWrap = document.getElementById('admin-wrap');
  var adminKey = document.getElementById('admin-key');
  var adminBtn = document.getElementById('admin-btn');
  var legalCheckbox = document.getElementById('legal-agree');
  var pollTimer = null;
  var subscribeBtnDefault = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg> Subscribe with Stripe';

  // Pre-fill email from auth if available
  window.zap.getSettings().then(function(s) {
    if (s.authEmail && !emailInput.value) emailInput.value = s.authEmail;
  }).catch(function(){});

  // Check if already licensed
  window.zap.getLicenseStatus().then(function(s) {
    if (s.licenseValid && s.hasKey && s.licensed) {
      // Fully licensed + terms accepted
      subscribeBtn.textContent = 'Already Subscribed';
      subscribeBtn.disabled = true;
      emailInput.disabled = true;
      emailInput.value = s.email || '';
      document.getElementById('skip-text').textContent = 'You can close this window.';
    } else if (s.licenseValid && s.hasKey && !s.licensed) {
      // Has subscription but hasn't accepted terms yet
      subscribeBtn.textContent = 'Already Subscribed';
      subscribeBtn.disabled = true;
      emailInput.disabled = true;
      emailInput.value = s.email || '';
      document.getElementById('skip-text').innerHTML = 'Please accept the terms above to continue using Zap.';
      // Show a dedicated accept button
      var acceptBtn = document.createElement('button');
      acceptBtn.className = 'subscribe-btn';
      acceptBtn.textContent = 'Accept & Continue';
      acceptBtn.style.marginTop = '14px';
      acceptBtn.addEventListener('click', async function() {
        if (!legalCheckbox.checked) {
          statusEl.textContent = 'You must agree to the Terms, Privacy Policy, and Acceptable Use Policy.';
          statusEl.className = 'status error';
          return;
        }
        await window.zap.acceptTerms();
        statusEl.textContent = 'Terms accepted! Zap is ready.';
        statusEl.className = 'status success';
        acceptBtn.textContent = 'Done!';
        acceptBtn.disabled = true;
        document.getElementById('skip-text').textContent = 'You can close this window.';
      });
      subscribeBtn.parentNode.insertBefore(acceptBtn, subscribeBtn.nextSibling);
    }
  });

  // Listen for checkout-cancelled event from main process
  window.zap.onCheckoutCancelled(function() {
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    resetToRetry('Checkout was not completed. Ready to try again.');
  });

  function resetToRetry(msg) {
    statusEl.textContent = msg;
    statusEl.className = 'status warn';
    subscribeBtn.disabled = false;
    subscribeBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Try Again';
  }

  // Toggle admin key section
  adminToggle.addEventListener('click', function(e) {
    e.preventDefault();
    adminWrap.style.display = adminWrap.style.display === 'block' ? 'none' : 'block';
    if (adminWrap.style.display === 'block') adminKey.focus();
  });

  // Admin key activation
  adminBtn.addEventListener('click', async function() {
    if (!legalCheckbox.checked) {
      statusEl.textContent = 'You must agree to the Terms, Privacy Policy, and Acceptable Use Policy.';
      statusEl.className = 'status error';
      return;
    }

    var key = adminKey.value.trim();
    if (!key) { statusEl.textContent = 'Please enter a key.'; statusEl.className = 'status error'; return; }

    adminBtn.disabled = true;
    adminBtn.textContent = 'Validating...';
    statusEl.textContent = '';

    var result = await window.zap.validateLicense(key);

    if (result.valid) {
      await window.zap.acceptTerms();
      statusEl.textContent = 'Activated!';
      statusEl.className = 'status success';
      adminBtn.textContent = 'Activated!';
    } else {
      statusEl.textContent = result.error || 'Invalid key.';
      statusEl.className = 'status error';
      adminBtn.disabled = false;
      adminBtn.textContent = 'Activate Key';
    }
  });

  adminKey.addEventListener('keydown', function(e) { if (e.key === 'Enter') adminBtn.click(); });

  // Legal links — open in external browser
  document.getElementById('link-terms').addEventListener('click', function(e){ e.preventDefault(); e.stopPropagation(); window.zap.openExternal('https://tryzap.net/terms'); });
  document.getElementById('link-privacy').addEventListener('click', function(e){ e.preventDefault(); e.stopPropagation(); window.zap.openExternal('https://tryzap.net/privacy'); });
  document.getElementById('link-aup').addEventListener('click', function(e){ e.preventDefault(); e.stopPropagation(); window.zap.openExternal('https://tryzap.net/acceptable-use'); });

  // Stripe Subscribe flow
  subscribeBtn.addEventListener('click', async function() {
    if (!legalCheckbox.checked) {
      statusEl.textContent = 'You must agree to the Terms, Privacy Policy, and Acceptable Use Policy.';
      statusEl.className = 'status error';
      return;
    }

    var email = emailInput.value.trim();
    if (!email || !email.includes('@')) {
      statusEl.textContent = 'Please enter a valid email address.';
      statusEl.className = 'status error';
      emailInput.focus();
      return;
    }

    subscribeBtn.disabled = true;
    subscribeBtn.innerHTML = '<span>Opening checkout...</span>';
    statusEl.textContent = '';

    try {
      // Create Stripe Checkout Session
      var session = await window.zap.createCheckoutSession(email);

      if (session.error) {
        statusEl.textContent = session.error;
        statusEl.className = 'status error';
        resetToRetry(session.error);
        return;
      }

      // Open checkout in a popup BrowserWindow
      await window.zap.openCheckoutWindow(session.url, session.sessionId);

      subscribeBtn.innerHTML = '<span>Complete payment in the popup...</span>';
      statusEl.textContent = 'Waiting for payment...';
      statusEl.className = 'status info';

      // Poll license status — short timeout (1 min), event-driven cancel handles the rest
      var attempts = 0;
      pollTimer = setInterval(async function() {
        attempts++;
        try {
          var s = await window.zap.getLicenseStatus();
          if (s.licenseValid) {
            clearInterval(pollTimer); pollTimer = null;
            await window.zap.acceptTerms();
            statusEl.textContent = 'Subscription activated!';
            statusEl.className = 'status success';
            subscribeBtn.innerHTML = 'Activated!';
          } else if (attempts > 30) { // 1 min timeout (checkout-cancelled event handles early close)
            clearInterval(pollTimer); pollTimer = null;
            resetToRetry('Payment not detected. Please try again.');
          }
        } catch (_) {}
      }, 2000);

    } catch (err) {
      resetToRetry(err.message || 'Failed to create checkout session. Please try again.');
    }
  });

  emailInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') subscribeBtn.click(); });
})();
</script>
</body>
</html>
